<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f5f3;
            font-family:'DM Sans', sans-serif;
        }

        .login-box{
            max-width:400px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:12px;
            border:1px solid #ddd;
        }

        .btn-login{
            background:#1D9E75;
            color:white;
            width:100%;
        }

        .btn-login:hover{
            background:#0F6E56;
        }

    </style>

</head>
<body>

<div class="login-box">

    <h3 class="mb-4">Iniciar Sesión</h3>

    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">

        <div class="mb-3">
            <label>Usuario</label>
            <input type="text" name="usuario" class="form-control">
        </div>

        <div class="mb-3">
            <label>Contraseña</label>
            <input type="password" name="password" class="form-control">
        </div>

        <button type="submit" class="btn btn-login">
            Entrar
        </button>

    </form>

</div>

</body>
</html>
