<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agregar Producto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f5f5f3; }
    .form-card { background: #fff; border: 0.5px solid #e0e0da; border-radius: 12px; padding: 1.5rem; max-width: 480px; margin: 3rem auto; }
    .form-title { font-size: 16px; font-weight: 500; margin: 0 0 1.25rem; padding-bottom: 0.75rem; border-bottom: 0.5px solid #e0e0da; }
    .form-title span { color: #1D9E75; }
    .form-label { font-size: 12px; font-weight: 500; color: #888780; text-transform: uppercase; letter-spacing: 0.04em; }
    .form-control, .form-select { font-size: 14px; border: 0.5px solid #ccc; border-radius: 8px; background: #f9f9f7; }
    .form-control:focus, .form-select:focus { border-color: #1D9E75; box-shadow: none; background: #fff; }
    .btn-guardar { background: #1D9E75; color: #fff; border: none; border-radius: 8px; width: 100%; padding: 9px; font-size: 14px; font-weight: 500; }
    .btn-guardar:hover { background: #0F6E56; color: #fff; }
  </style>
</head>
<body>
<div class="form-card">
  <p class="form-title"><span>+</span> Agregar producto</p>
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Tipo de producto</label>
      <input type="text" class="form-control" name="tipo_producto" placeholder="Ej. CPU, GPU…">
    </div>
    <div class="mb-3">
      <label class="form-label">Marca</label>
      <input type="text" class="form-control" name="marca" placeholder="Ej. Intel, AMD…">
    </div>
    <div class="mb-3">
      <label class="form-label">Estatus</label>
      <select class="form-select" name="estatus">
        <option value="">— Seleccionar —</option>
        <option value="Disponible">Disponible</option>
        <option value="En espera">En espera</option>
        <option value="Agotado">Agotado</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Fecha</label>
      <input type="date" class="form-control" name="fecha">
    </div>
    <div class="mb-3">
      <label class="form-label">Cantidad</label>
      <input type="number" class="form-control" name="cantidad" placeholder="0">
    </div>
    <div class="mb-3">
      <label class="form-label">Precio</label>
      <input type="number" class="form-control" name="precio" step="0.01" placeholder="0.00">
    </div>
    <button type="submit" class="btn-guardar">Guardar</button>
  </form>
</div>
</body>
</html>
