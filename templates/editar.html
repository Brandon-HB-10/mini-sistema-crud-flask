<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Producto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f5f5f3; }
    .form-card { background: #fff; border: 0.5px solid #e0e0da; border-radius: 12px; padding: 1.5rem; max-width: 480px; margin: 3rem auto; }
    .form-title { font-size: 16px; font-weight: 500; margin: 0 0 1.25rem; padding-bottom: 0.75rem; border-bottom: 0.5px solid #e0e0da; }
    .form-title span { color: #1D9E75; }
    .form-label { font-size: 12px; font-weight: 500; color: #888780; text-transform: uppercase; letter-spacing: 0.04em; }
    .form-control, .form-select { font-size: 14px; border: 0.5px solid #ccc; border-radius: 8px; background: #f9f9f7; }
    .form-control:focus, .form-select:focus { border-color: #1D9E75; box-shadow: none; background: #fff; }
    .btn-actualizar { background: #f0ede8; color: #2C2C2A; border: 0.5px solid #ccc; border-radius: 8px; width: 100%; padding: 9px; font-size: 14px; font-weight: 500; }
    .btn-actualizar:hover { background: #e0ddd6; }
  </style>
</head>
<body>
<div class="form-card">
  <p class="form-title"><span>✏</span> Editar producto</p>
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Tipo de producto</label>
      <input type="text" class="form-control" name="tipo_producto" value="{{ producto[1] }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Marca</label>
      <input type="text" class="form-control" name="marca" value="{{ producto[2] }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Estatus</label>
      <select class="form-select" name="estatus">
        <option value="Activo" {% if producto[3] == 'Activo' %}selected{% endif %}>Activo</option>
        <option value="Inactivo" {% if producto[3] == 'Inactivo' %}selected{% endif %}>Inactivo</option>
        <option value="Pendiente" {% if producto[3] == 'Pendiente' %}selected{% endif %}>Pendiente</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Fecha</label>
      <input type="date" class="form-control" name="fecha" value="{{ producto[4] }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Cantidad</label>
      <input type="number" class="form-control" name="cantidad" value="{{ producto[5] }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Precio</label>
      <input type="number" class="form-control" name="precio" step="0.01" value="{{ producto[6] }}">
    </div>
    <button type="submit" class="btn-actualizar">Actualizar</button>
  </form>
</div>
</body>
</html>
