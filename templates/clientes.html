<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f5f5f3; }
    .page-title span { color: #1D9E75; }
    .btn-add { display: inline-flex; align-items: center; gap: 8px; background: #1D9E75; color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: 14px; font-weight: 500; text-decoration: none; transition: background 0.15s; }
    .btn-add:hover { background: #0F6E56; color: #fff; }
    .stat-card { background: #fff; border-radius: 8px; padding: 0.85rem 1rem; border: 0.5px solid #e0e0da; }
    .stat-label { font-size: 12px; color: #888780; margin: 0 0 4px; }
    .stat-value { font-size: 22px; font-weight: 500; margin: 0; }
    .table-wrap { background: #fff; border: 0.5px solid #e0e0da; border-radius: 12px; overflow: hidden; }
    .table { font-size: 14px; margin: 0; }
    .table thead { background: #f5f5f3; }
    .table thead th { font-size: 12px; font-weight: 500; color: #888780; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 0.5px solid #e0e0da; padding: 11px 14px; }
    .table tbody td { padding: 12px 14px; vertical-align: middle; border-color: #f0ede8; }
    .table tbody tr:last-child td { border-bottom: none; }
    .table tbody tr:hover { background: #f9f9f7; }
    .id-badge { background: #E6F1FB; color: #185FA5; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; }
    .btn-edit-sm { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 500; padding: 5px 11px; border-radius: 8px; border: 0.5px solid #d0cfc6; background: #fff; color: #2C2C2A; text-decoration: none; transition: background 0.12s; }
    .btn-edit-sm:hover { background: #f0ede8; }
    .btn-del-sm { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 500; padding: 5px 11px; border-radius: 8px; border: 0.5px solid #F0957B; background: #FAECE7; color: #993C1D; text-decoration: none; transition: background 0.12s; }
    .btn-del-sm:hover { background: #F5C4B3; }
  </style>
</head>
<body>
<div class="container py-4">

  <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
    <h1 class="page-title fs-4 fw-500 mb-0">Lista de <span>Clientes</span></h1>
    <a href="/agregar_cliente" class="btn-add">+ Agregar cliente</a>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <p class="stat-label">Total clientes</p>
        <p class="stat-value">{{ clientes|length }}</p>
      </div>
    </div>
  </div>

  <div class="mb-3">
    <input type="text" id="search-input" class="form-control"
           placeholder="Buscar por nombre, correo…"
           style="font-size: 14px; border-radius: 8px; border: 0.5px solid #ccc;">
  </div>

  <div class="table-wrap">
    <table class="table" id="clientes-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Teléfono</th>
          <th>Correo</th>
          <th>Dirección</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        {% for c in clientes %}
        <tr>
          <td><span class="id-badge">#{{ "%03d"|format(c[0]) }}</span></td>
          <td>{{ c[1] }}</td>
          <td>{{ c[2] }}</td>
          <td>{{ c[3] }}</td>
          <td>{{ c[4] }}</td>
          <td>
            <div class="d-flex gap-2">
              <a href="/editar_cliente/{{ c[0] }}" class="btn-edit-sm">✏ Editar</a>
              <a href="/eliminar_cliente/{{ c[0] }}" class="btn-del-sm"
                 onclick="return confirm('¿Eliminar a {{ c[1] }}?')">🗑 Eliminar</a>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

</div>
<script>
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  document.querySelectorAll('#clientes-table tbody tr').forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
});
</script>
</body>
</html>
