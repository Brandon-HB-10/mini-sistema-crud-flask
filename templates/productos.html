<!DOCTYPE html>
<html>
<head>
    <title>productos</title>
</head>
<body>

<h1>Lista de Productos</h1>

<table border="1">
<tr>
<th>ID</th>
<th>Tipo</th>
<th>Marca</th>
<th>Estatus</th>
<th>Fecha</th>
<th>Cantidad</th>
<th>Precio</th>
</tr>

{% for p in productos %}
<tr>
<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>{{ p[4] }}</td>
<td>{{ p[5] }}</td>
<td>{{ p[6] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
